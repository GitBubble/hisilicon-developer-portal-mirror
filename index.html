<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ModelZoo镜像站</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <div class="header">
        <div class="header-left">
            <a href="index.html" class="site-brand" aria-label="ModelZoo镜像站">
                <div class="brand-badge">MZ</div>
                <div class="brand-copy">
                    <span class="brand-subtitle">自动同步时间：2026-03-28 08:07:58</span>
                    <strong class="brand-title">ModelZoo镜像站</strong>
                </div>
            </a>
            <div class="header-nav">
                <a href="index.html" class="nav-item active">
                    <span>ModelZoo</span>
                </a>
            </div>
            <div class="daily-quote" aria-live="polite">
                <p class="quote-text" id="dailyQuoteText">技术的价值，在于让复杂的事情变得可控。</p>
                <span class="quote-author" id="dailyQuoteAuthor">- 今日推荐</span>
            </div>
        </div>
    </div>

    <div class="main-container">
        <div class="filter-sidebar">
            <div class="filter-header">
                <span>筛选条件</span>
                <a href="#" class="clear-filter">清除全部</a>
            </div>
            
            <div class="filter-section">
                <div class="filter-title">
                    <span>任务</span>
                    <span class="expand-icon">▾</span>
                </div>
                <div id="taskFilterGroups"></div>
            </div>

            <div class="filter-section">
                <div class="filter-title">
                    <span>框架</span>
                    <span class="expand-icon">▾</span>
                </div>
                <div class="filter-content">
                    <div class="filter-tags" id="frameworkFilters"></div>
                </div>
            </div>

            <div class="filter-section">
                <div class="filter-title">
                    <span>操作系统</span>
                    <span class="expand-icon">▾</span>
                </div>
                <div class="filter-content">
                    <div class="filter-tags" id="supportOsFilters"></div>
                </div>
            </div>

            <div class="filter-section">
                <div class="filter-title">
                    <span>算力引擎</span>
                    <span class="expand-icon">▾</span>
                </div>
                <div class="filter-content">
                    <div class="filter-tags" id="computingPowerFilters"></div>
                </div>
            </div>

            <div class="friendly-links">
                <div class="filter-title">
                    <span>友情链接</span>
                </div>
                <a href="https://developers.hisilicon.com/forum/01101205484609485006" class="friendly-link" target="_blank" rel="noreferrer">
                    <span class="friendly-link-icon">↗</span>
                    <span>Hispark论坛</span>
                </a>
                <a href="https://www.hisilicon.com/cn/products/smart-vision" class="friendly-link" target="_blank" rel="noreferrer">
                    <span class="friendly-link-icon">↗</span>
                    <span>海思AIoT</span>
                </a>
            </div>
        </div>

        <div class="content-area">
            <div class="search-bar">
                <input type="text" placeholder="搜索模型名称" class="search-input">
                <button class="search-btn">🔍</button>
            </div>
            
            <div class="sort-bar">
                <select class="sort-select">
                    <option>默认排序</option>
                </select>
            </div>

            <div class="model-grid" id="modelGrid">
                <!-- Models will be populated by JavaScript -->
            </div>

            <div class="pagination">
                <span>共47条</span>
                <span>每页</span>
                <select class="page-size-select">
                    <option>12</option>
                </select>
                <span>条</span>
                <button class="page-btn" disabled>‹</button>
                <ul class="page-numbers">
                    <li class="active">1</li>
                    <li>2</li>
                    <li>3</li>
                    <li>4</li>
                </ul>
                <button class="page-btn">›</button>
                <span>前往</span>
                <input type="text" class="page-input" value="1">
                <span>页</span>
            </div>
        </div>
    </div>

    <footer class="site-footer">
        <span>由开发者自行维护，更新时间：2026-03-28 08:07:58</span>
    </footer>

    <div class="cookie-banner">
        <span>我们使用cookie来确保您的高速浏览体验。继续浏览本站，即表示您同意我们使用cookie。</span>
        <a href="#">详情</a>
        <button class="close-btn">×</button>
    </div>

    <script src="assets/js/models.js"></script>
    <script src="assets/js/app.js"></script>
</body>
</html>
