<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>模型详情 - ModelZoo镜像站</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <div class="header">
        <div class="header-left">
            <a href="index.html" class="site-brand" aria-label="ModelZoo镜像站">
                <div class="brand-badge">MZ</div>
                <div class="brand-copy">
                    <span class="brand-subtitle" id="headerDateText">日期：2026-03-28</span>
                    <strong class="brand-title">ModelZoo镜像站</strong>
                </div>
            </a>
            <div class="header-nav">
                <a href="index.html" class="nav-item active">ModelZoo</a>
            </div>
            <div class="daily-quote" aria-live="polite">
                <p class="quote-text" id="dailyQuoteText">技术的价值，在于让复杂的事情变得可控。</p>
                <span class="quote-author" id="dailyQuoteAuthor">- 随机一言</span>
            </div>
        </div>
    </div>

    <div class="main-container">
        <div class="detail-container">
            <a href="index.html" class="back-btn">← 返回模型市场</a>
            
            <div class="detail-header">
                <div id="modelImage" class="detail-hero-image"></div>
                <div class="detail-header-main">
                    <h1 id="modelName">模型名称</h1>
                    <span id="modelBadge" class="detail-badge" style="display: none;"></span>
                    <div id="modelTags" class="detail-tags"></div>
                    <div class="resource-links">
                        <a id="hfRepoLink" class="resource-link" href="#" target="_blank" rel="noreferrer">HF 镜像仓库</a>
                        <a id="hfReadmeLink" class="resource-link" href="#" target="_blank" rel="noreferrer">HF README</a>
                        <a id="quickStartLink" class="resource-link" href="#" target="_blank" rel="noreferrer">快速开始</a>
                        <a id="repositoryLink" class="resource-link" href="#" target="_blank" rel="noreferrer">代码仓库</a>
                        <a id="licenseLink" class="resource-link" href="#" target="_blank" rel="noreferrer">许可证</a>
                    </div>
                    <div id="betaNote" class="detail-note" style="display: none;"></div>
                </div>
            </div>
            
            <div class="detail-content">
                <div class="detail-section">
                    <h2>模型描述</h2>
                    <p id="modelDescription">模型描述内容...</p>
                </div>
                
                <div class="detail-section">
                    <h2>基本信息</h2>
                    <div class="detail-meta">
                        <div class="detail-meta-item">
                            <span>📅</span>
                            <span id="modelDate">更新时间</span>
                        </div>
                        <div class="detail-meta-item">
                            <span>🕒</span>
                            <span id="modelUpdatedAt">最近更新</span>
                        </div>
                        <div class="detail-meta-item">
                            <span>🏷️</span>
                            <span id="modelCategory">任务类型</span>
                        </div>
                        <div class="detail-meta-item">
                            <span>📦</span>
                            <span id="modelCount">0 个可用文件</span>
                        </div>
                        <div class="detail-meta-item">
                            <span>🌐</span>
                            <span id="modelRepoId">HF Repo</span>
                        </div>
                        <div class="detail-meta-item">
                            <span>📈</span>
                            <span id="modelPageCounter">已浏览 0 次</span>
                        </div>
                    </div>
                    <div id="frameworkTags" class="detail-pills"></div>
                    <div id="osTags" class="detail-pills"></div>
                    <div id="computeTags" class="detail-pills"></div>
                </div>
                
                <div class="action-buttons">
                    <a id="downloadLink" class="btn btn-primary">下载模型</a>
                    <a id="repoActionLink" class="btn btn-secondary" href="#" target="_blank" rel="noreferrer">打开 HF 镜像仓库</a>
                    <button id="shareLinkButton" class="btn btn-secondary" type="button">分享链接</button>
                </div>

                <div id="detailParamsSection" class="detail-section">
                    <h2>模型参数</h2>
                    <div id="detailParamsList" class="detail-params-grid"></div>
                </div>

                <div class="detail-section">
                    <h2>下载清单</h2>
                    <div id="downloadSections"></div>
                </div>

                <div id="originModelsSection" class="detail-section" style="display: none;">
                    <h2>原始模型链接</h2>
                    <div id="originModelsTable"></div>
                </div>

                <div id="readmeSection" class="detail-section" style="display: none;">
                    <h2>README / 快速开始</h2>
                    <div id="readmeLinks" class="readme-links"></div>
                    <div id="readmeSections"></div>
                </div>
            </div>
        </div>
    </div>

    <footer class="site-footer detail-footer">
        <span>由开发者自行维护，更新时间：2026-03-28 08:07:58</span>
    </footer>

    <script src="assets/js/models.js"></script>
    <script src="assets/js/models-detail.js"></script>
</body>
</html>
