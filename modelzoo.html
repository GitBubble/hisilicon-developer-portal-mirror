<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ModelZoo镜像站</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body data-title-key="page.homeTitle">
    <div class="header">
        <div class="header-left">
            <a href="index.html" class="site-brand" data-i18n-aria-label="header.brandAria">
                <div class="brand-badge">MZ</div>
                <div class="brand-copy">
                    <span class="brand-subtitle" id="headerDateText">日期：2026-03-28</span>
                    <strong class="brand-title" data-i18n="header.brandTitle">ModelZoo镜像站</strong>
                </div>
            </a>
            <div class="header-nav">
                <a href="modelzoo.html" class="nav-item active">
                    <span data-i18n="header.navModelZoo">ModelZoo</span>
                </a>
            </div>
            <div class="daily-quote" aria-live="polite">
                <p class="quote-text" id="dailyQuoteText">技术的价值，在于让复杂的事情变得可控。</p>
                <span class="quote-author" id="dailyQuoteAuthor">- 随机一言</span>
            </div>
            <div class="language-switcher" data-i18n-aria-label="header.languageSwitcher">
                <button type="button" class="language-btn" data-lang-option="zh">中</button>
                <button type="button" class="language-btn" data-lang-option="en">EN</button>
            </div>
        </div>
    </div>

    <div class="main-container">
        <div class="filter-sidebar">
            <div class="filter-header">
                <span data-i18n="home.filterTitle">筛选条件</span>
                <a href="#" class="clear-filter" data-i18n="home.clearAll">清除全部</a>
            </div>

            <div class="filter-section">
                <div class="filter-title">
                    <span data-i18n="home.sectionTask">任务</span>
                    <span class="expand-icon">▾</span>
                </div>
                <div id="taskFilterGroups"></div>
            </div>

            <div class="filter-section">
                <div class="filter-title">
                    <span data-i18n="home.sectionFramework">框架</span>
                    <span class="expand-icon">▾</span>
                </div>
                <div class="filter-content">
                    <div class="filter-tags" id="frameworkFilters"></div>
                </div>
            </div>

            <div class="filter-section">
                <div class="filter-title">
                    <span data-i18n="home.sectionOs">操作系统</span>
                    <span class="expand-icon">▾</span>
                </div>
                <div class="filter-content">
                    <div class="filter-tags" id="supportOsFilters"></div>
                </div>
            </div>

            <div class="filter-section">
                <div class="filter-title">
                    <span data-i18n="home.sectionCompute">算力引擎</span>
                    <span class="expand-icon">▾</span>
                </div>
                <div class="filter-content">
                    <div class="filter-tags" id="computingPowerFilters"></div>
                </div>
            </div>

            <div class="friendly-links">
                <div class="filter-title">
                    <span data-i18n="home.sectionLinks">友情链接</span>
                </div>
                <a href="https://developers.hisilicon.com/forum/01101205484609485006" class="friendly-link" target="_blank" rel="noreferrer">
                    <span class="friendly-link-icon">↗</span>
                    <span data-i18n="home.hisparkForum">Hispark论坛</span>
                </a>
                <a href="https://www.hisilicon.com/cn/products/smart-vision" class="friendly-link" target="_blank" rel="noreferrer">
                    <span class="friendly-link-icon">↗</span>
                    <span data-i18n="home.hisiliconAiot">海思AIoT</span>
                </a>
            </div>
        </div>

        <div class="content-area">
            <div class="search-bar">
                <input type="text" placeholder="搜索模型名称" class="search-input" data-i18n-placeholder="home.searchPlaceholder">
                <button class="search-btn" data-i18n-aria-label="home.searchAria">🔍</button>
            </div>

            <div class="sort-bar">
                <select class="sort-select">
                    <option>默认排序</option>
                </select>
            </div>

            <div class="model-grid" id="modelGrid"></div>

            <div class="pagination">
                <span>共47条</span>
                <span data-i18n="home.paginationPerPage">每页</span>
                <select class="page-size-select">
                    <option>12</option>
                </select>
                <span data-i18n="home.paginationItems">条</span>
                <button class="page-btn" disabled>‹</button>
                <ul class="page-numbers">
                    <li class="active">1</li>
                </ul>
                <button class="page-btn">›</button>
                <span data-i18n="home.paginationGoTo">前往</span>
                <input type="text" class="page-input" value="1">
                <span data-i18n="home.paginationPage">页</span>
            </div>
        </div>
    </div>

    <footer class="site-footer">
        <span data-updated-at="2026-03-28 08:07:58">由开发者自行维护，更新时间：2026-03-28 18:11:12</span>
    </footer>

    <div class="cookie-banner">
        <span data-i18n="cookie.message">我们使用cookie来确保您的高速浏览体验。继续浏览本站，即表示您同意我们使用cookie。</span>
        <a href="#" data-i18n="cookie.details">详情</a>
        <button class="close-btn">×</button>
    </div>

    <script src="assets/js/models.js"></script>
    <script src="assets/js/i18n.js"></script>
    <script src="assets/js/app.js"></script>
</body>
</html>
